name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ] # Remplace par "master" si besoin

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      # 1. NETTOYAGE ET REMPLACEMENT DES CDN VIA SED (Insensible aux espaces/sauts de ligne)
      - name: Swap CDNs via sed
        run: |
          # Supprime les retours à la ligne Windows (\r) pour éviter que sed ne loupe la fin des balises
          sed -i 's/\r//g' index.html
          
          # Remplace n'importe quelle balise script contenant cdn.tailwindcss.com
          sed -E -i 's|<script [^>]*cdn\.tailwindcss\.com[^>]*></script>|<link href="./dist/output.css" rel="stylesheet">|g' index.html

      # 2. COMPILATION TAILWIND ULTRA-LÉGÈRE (Scan ciblé des fichiers du projet, node_modules ignoré)
      - name: Build Tailwind CSS (Minified)
        run: npx tailwindcss -i ./input.css -o ./dist/output.css --minify

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4